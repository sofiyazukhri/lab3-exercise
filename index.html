<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Weather Dashboard</title>
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<style>
		body { 
			font-family: 'Segoe UI', Roboto, sans-serif; 
			background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); 
			min-height: 100vh;
			padding: 20px; 
			margin: 0; 
		}

		.header { 
			text-align: center; 
            color: #2c3e50; 
            margin-top: 20px;
            margin-bottom: 30px; 
        }

        .header h1 { 
            font-size: 2.5rem; 
            margin-bottom: 5px; 
        }

        .header p { 
           font-size: 1.1rem; 
           opacity: 0.8; 
        } 

		.search-bar { text-align:center; margin-bottom: 30px; }

		#citySearch {
			padding: 12px 20px;
			width: 300px;
			border-radius: 25px;
			border: none;
			box-shadow: 0 4px 10px rgba(0,0,0,0.1);
			outline: none;
		}

		#searchBtn {
			padding: 12px 25px;
			border-radius: 25px;
			border: none;
			background: #4facfe;
			color: white;
			font-weight: bold;
			cursor: pointer;
			transition: background 0.3s;
			box-shadow: 0 4px 10px rgba(0,0,0,0.1);
		}

		#searchBtn:hover { background: #00f2fe; }

		.current-weather {
			background: rgba(255, 255, 255, 0.9); 
			padding: 40px; 
			border-radius: 20px;
			max-width: 500px; 
			margin: 0 auto; 
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); 
			text-align: center;
		}

		.forecast-row {
			display: flex; 
			gap: 15px; 
			justify-content: center; 
			margin-top: 30px; 
			flex-wrap: wrap; 
		}
		.forecast-card {
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(5px);
            padding: 20px; 
            border-radius: 15px; 
            width: 110px; 
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

         .forecast-card:hover { transform: translateY(-5px); }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

         .skeleton {
            background: linear-gradient(90deg, #e0e0e0 25%, #f5f5f5 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
            display: block;
        }

         .sk-title { width: 60%; height: 32px; margin: 10px auto; }
        .sk-text { width: 40%; height: 20px; margin: 10px auto; }
        .sk-card-img { width: 40px; height: 40px; margin: 10px auto; }
	</style>
</head>
<body>
	<div class="header">
		<h1>Weather Dashboard</h1>
		<p>Live Weather Updates & 7-Day Forecast</p>
    </div>

	<div class="search-bar">
		<input type="text" id="citySearch" placeholder="Search city (e.g Kuala Lumpur)">
		<button id="searchBtn">Search</button>
	</div>

	<div class="current-weather">
		<div id="cityName" class="skeleton sk-title"></div>
		<div id="temp" class="skeleton sk-text"></div>
		<div id="weatherDesc" class="skeleton sk-text"></div>
		<div id="humidity" class="skeleton sk-text"></div>
		<div id="windSpeed" class="skeleton sk-text"></div>
		<div id="localTime" class="skeleton sk-text"></div>
	</div>

	 <div class="forecast-row">
        <div class="forecast-card">
        	<div class="skeleton sk-text"></div>
        	<div class="skeleton sk-card-img"></div>
        	<div class="skeleton sk-text"></div>
        </div>

        <div class="forecast-card">
        	<div class="skeleton sk-text"></div>
        	<div class="skeleton sk-card-img"></div>
        	<div class="skeleton sk-text"></div>
        </div>

        <div class="forecast-card">
        	<div class="skeleton sk-text"></div>
        	<div class="skeleton sk-card-img"></div>
        	<div class="skeleton sk-text"></div>
        </div>

        <div class="forecast-card">
        	<div class="skeleton sk-text"></div>
        	<div class="skeleton sk-card-img"></div>
        	<div class="skeleton sk-text"></div>
        </div>

        <div class="forecast-card">
        	<div class="skeleton sk-text"></div>
        	<div class="skeleton sk-card-img"></div>
        	<div class="skeleton sk-text"></div>
        </div>

        <div class="forecast-card">
        	<div class="skeleton sk-text"></div>
        	<div class="skeleton sk-card-img"></div>
        	<div class="skeleton sk-text"></div>
        </div>

        <div class="forecast-card">
        	<div class="skeleton sk-text"></div>
        	<div class="skeleton sk-card-img"></div>
        	<div class="skeleton sk-text"></div>
        </div>

    </div>

    <script>
    	let debounceTimer;
    	const weatherLookup = {
    		0: { desc: "Sunny", icon: "☀️" },   
    		3: { desc: "Cloudy", icon: "☁️" },  
            61: { desc: "Rainy", icon: "🌧️" },  
            95: { desc: "Stormy", icon: "⛈️" } 
        };

        $("#searchBtn").click(function() {
        	const city = $("#citySearch").val().trim();
        	if (city.length < 2) {
        		alert("Please enter a valid city name.");
        		return;
        	}

        	clearTimeout (debounceTimer);
        	debounceTimer = setTimeout(() => {
        		getWeatherData(city);
        	}, 500);
        });

        function getWeatherData(city) {
        	const controller = new AbortController();
        	const timeoutId = setTimeout(() => controller.abort(), 10000);
        	const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`;

        	fetch(geoUrl, {signal: controller.signal})
        	.then(response => {
                if (!response.ok) throw new Error("Network error");
                return response.json();
            })
            .then(geoData => {
                if (!geoData.results) {
                    alert("City not found!");
                    clearTimeout(timeoutId);
                    return;
                }
                const { latitude, longitude, name } = geoData.results[0];
                
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`;

                return fetch(weatherUrl, { signal: controller.signal })
                    .then(res => res.json())
                    .then(data => ({ name, data }));
            })
            .then(result => {
                if (result) {
                	clearTimeout(timeoutId);
                    updateUI(result.name, result.data);
                }
            })
            .catch(error => {
            	if (error.name === 'AbortError'){
            		alert("Request timed out.");
            	} else {
            		console.error("Error:", error);
            		alert("Something went wrong fetching the data.");
            	}
            });
        }

        function updateUI(cityName, weatherData) {
        	localStorage.setItem("lastSearchedCity", cityName);
        	const current = weatherData.current_weather;
        	const code = current.weathercode;
        	const weather = weatherLookup[code] || { desc: "Cloudy", icon: "☁️" };
        	$("#cityName").removeClass("skeleton").text(cityName);
            $("#temp").removeClass("skeleton").text(current.temperature + "°C");
            $("#weatherDesc").removeClass("skeleton").text(weather.icon + " " + weather.desc);
            $("#humidity").removeClass("skeleton").text("Humidity: 60%");
            $("#windSpeed").removeClass("skeleton").text("Wind: " + current.windspeed + " km/h");
            $("#localTime").removeClass("skeleton").text("Update: " + current.time.split("T")[1]);

            const daily = weatherData.daily;
            const cards = $(".forecast-card");

            for (let i = 0; i < 7; i++) {
            	const dayCard = $(cards[i]);
                const dayCode = daily.weathercode[i];
                const dayWeather = weatherLookup[dayCode] || { desc: "Cloudy", icon: "☁️" };
       
                const date = new Date(daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                
                dayCard.removeClass("skeleton").html(`
                <div style="font-weight: bold;">${dayName}</div>
                <div style="font-size: 1.5rem; margin: 5px 0;">${dayWeather.icon}</div>
                <div style="font-size: 0.9rem;">
                ${Math.round(daily.temperature_2m_max[i])}° / 
                <span style="color: #666;">${Math.round(daily.temperature_2m_min[i])}°</span>
                </div>
                `);
            }
        }

        const savedCity = localStorage.getItem("lastSearchedCity");
        if (savedCity) {
        	getWeatherData(savedCity);
        }

    </script>
	
</body>
</html>
